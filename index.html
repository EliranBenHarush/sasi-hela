class FirestoreAPI {
  constructor(projectId, apiKey) {
    this.projectId = projectId;
    this.apiKey = apiKey;
    this.baseUrl = `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents`;
  }

  async _request(method, path, data = null) {
    const url = `${this.baseUrl}${path}?key=${this.apiKey}`;
    const options = {
      method,
      headers: { "Content-Type": "application/json" }
    };
    if (data) options.body = JSON.stringify(data);

    try {
      const res = await fetch(url, options);
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || `HTTP ${res.status}`);
      }
      return await res.json();
    } catch (err) {
      console.error(`Firestore ${method} ${path}:`, err);
      throw err;
    }
  }

  _parseDoc(doc) {
    if (!doc.fields) return null;
    const fields = doc.fields;
    const obj = {};
    for (const [key, value] of Object.entries(fields)) {
      if (value.stringValue !== undefined) obj[key] = value.stringValue;
      else if (value.integerValue !== undefined) obj[key] = parseInt(value.integerValue);
      else if (value.booleanValue !== undefined) obj[key] = value.booleanValue;
      else if (value.timestampValue !== undefined) obj[key] = value.timestampValue;
    }
    return obj;
  }

  async getOrders() {
    try {
      const res = await this._request("GET", "/orders");
      return (res.documents || []).map(d => this._parseDoc(d)).filter(d => d);
    } catch (err) {
      console.warn("Could not load orders from Firestore");
      return [];
    }
  }

  async getDrivers() {
    try {
      const res = await this._request("GET", "/drivers");
      return (res.documents || []).map(d => this._parseDoc(d)).filter(d => d);
    } catch (err) {
      console.warn("Could not load drivers from Firestore");
      return [];
    }
  }

  async createOrder(order) {
    const docData = {
      fields: {
        id: { stringValue: order.id },
        bankCode: { stringValue: order.bankCode },
        branchNumber: { stringValue: order.branchNumber },
        branchName: { stringValue: order.branchName },
        driverId: { stringValue: order.driverId },
        cartons: { integerValue: String(order.cartons) },
        date: { stringValue: order.date },
        time: { stringValue: order.time },
        status: { stringValue: order.status },
        notes: { stringValue: order.notes || "" },
        company: { stringValue: "default" },
        createdAt: { timestampValue: new Date().toISOString() }
      }
    };
    return this._request("POST", "/orders", docData);
  }

  async updateOrderStatus(orderId, status) {
    const docData = {
      fields: {
        status: { stringValue: status },
        updatedAt: { timestampValue: new Date().toISOString() }
      }
    };
    return this._request("PATCH", `/orders/${orderId}?updateMask.fieldPaths=status&updateMask.fieldPaths=updatedAt`, docData);
  }

  async addDriver(driver) {
    const docData = {
      fields: {
        id: { stringValue: driver.id },
        name: { stringValue: driver.name },
        phone: { stringValue: driver.phone },
        vehicle: { stringValue: driver.vehicle },
        color: { stringValue: driver.color },
        company: { stringValue: "default" },
        active: { booleanValue: true },
        createdAt: { timestampValue: new Date().toISOString() }
      }
    };
    return this._request("POST", "/drivers", docData);
  }

  async deleteDriver(driverId) {
    return this._request("DELETE", `/drivers/${driverId}`, null);
  }
}

function pad(n) { return String(n).padStart(2, "0"); }
function todayISO(offsetDays = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fmtDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  const t = todayISO(), tm = todayISO(1), ye = todayISO(-1);
  if (iso === t)  return "היום";
  if (iso === tm) return "מחר";
  if (iso === ye) return "אתמול";
  return `${d}.${m}`;
}

function Button({ children, variant = "primary", size = "md", icon, full, onClick, type, style }) {

    primary: { background: "var(--primary)", color: "var(--on-primary)", boxShadow: "var(--shadow)" },
    soft:    { background: "var(--primary-soft)", color: "var(--primary)" },
    ghost:   { background: "transparent", color: "var(--ink)", borderColor: "var(--line)" },
    plain:   { background: "transparent", color: "var(--muted)" },
    danger:  { background: "transparent", color: "#dc2626", borderColor: "#f3c6c6" },
  };
  return (
    <button type={type || "button"} onClick={onClick}
      onMouseDown={e => e.currentTarget.style.transform = "scale(.97)"}
      onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
      onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
      style={{ ...base, ...variants[variant], ...style }}>
      {icon && <Icon name={icon} size={size === "lg" ? 22 : 18} />}
      {children}
    </button>
  );
}

          <Avatar name={driver?.name} color={driver?.color} size={26} />
          <span style={{ fontSize: 13.5, color: "var(--muted)" }}>{driver?.name || "ללא שיוך"}</span>
          <span style={{ marginInlineStart: "auto", fontSize: 12.5, color: "var(--muted)", fontVariantNumeric: "tabular-nums" }}>{order.id}</span>
        </div>
      </div>
    );
  }

  return (
    <div onClick={() => onOpen(order)} style={{
      display: "grid", gridTemplateColumns: "minmax(160px,1.4fr) 1fr auto auto auto",
      gap: 14, alignItems: "center", padding: "14px 18px", cursor: "pointer",
      background: "var(--surface)", borderBottom: "1px solid var(--line)" }}
      className="order-row">
      <div>
        <div style={{ fontWeight: 700, fontSize: 15.5, color: "var(--ink)" }}>{bank.name}</div>
        <div style={{ color: "var(--muted)", fontSize: 13, marginTop: 2 }}>סניף {order.branchNumber} · {order.branchName}</div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
        <Avatar name={driver?.name} color={driver?.color} size={30} />
        <span style={{ fontSize: 14, color: "var(--ink)" }}>{driver?.name || "—"}</span>
      </div>
      <div style={{ display: "inline-flex", alignItems: "center", gap: 6, fontWeight: 700, fontSize: 15, color: "var(--ink)" }}>
        <Icon name="box" size={16} /> {order.cartons}
      </div>
      <div style={{ color: "var(--muted)", fontSize: 13.5, whiteSpace: "nowrap" }}>{fmtDate(order.date)} · {order.time}</div>
      <StatusPill status={order.status} />
    </div>
  );
}

function StatTiles({ orders }) {
  const open    = orders.filter(o => o.status !== "done").length;
  const transit = orders.filter(o => o.status === "transit").length;
  const cartons = orders.filter(o => o.status !== "done").reduce((a, o) => a + o.cartons, 0);
  const done    = orders.filter(o => o.status === "done").length;
  const tiles = [
    { label: "הזמנות פתוחות",  value: open,    icon: "list",  hue: 38  },
    { label: "בדרך כעת",       value: transit, icon: "truck", hue: 235 },
    { label: "קרטונים לחלוקה", value: cartons, icon: "box",   hue: 280 },
    { label: "הושלמו",          value: done,    icon: "check", hue: 150 },
  ];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(136px, 1fr))", gap: 14 }}>
      {tiles.map(t => (
        <div key={t.label} style={{ background: "var(--surface)", border: "1.5px solid var(--line)",
          borderRadius: "var(--radius-lg)", padding: 18, boxShadow: "var(--shadow)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, color: "var(--muted)", fontSize: 13.5 }}>
            <span style={{ width: 32, height: 32, borderRadius: 9, display: "grid", placeItems: "center",
              background: `oklch(0.95 0.05 ${t.hue})`, color: `oklch(0.5 0.13 ${t.hue})` }}>
              <Icon name={t.icon} size={17} />
            </span>
            {t.label}
          </div>
          <div style={{ fontWeight: 800, fontSize: 32, color: "var(--ink)", marginTop: 10, fontVariantNumeric: "tabular-nums" }}>{t.value}</div>
        </div>
      ))}
    </div>
  );
}

function EmptyState({ text }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12, padding: "56px 0", color: "var(--muted)" }}>
      <div style={{ width: 64, height: 64, borderRadius: 18, background: "var(--surface)", border: "1.5px solid var(--line)",
        display: "grid", placeItems: "center" }}><Icon name="box" size={28} /></div>
      <div style={{ fontSize: 15 }}>{text}</div>
    </div>
  );
}

function OrdersScreen({ orders, drivers, layout, onOpen, onNew }) {
  const [q, setQ] = useStateS("");
  const [filter, setFilter] = useStateS("all");

  const filtered = useMemo(() => orders.filter(o => {
    if (filter !== "all" && o.status !== filter) return false;
    if (!q.trim()) return true;
    const bank = bankByCode(o.bankCode).name;
    const dn = driverById(drivers, o.driverId)?.name || "";
    return (bank + o.branchNumber + o.branchName + dn + o.id).includes(q.trim());
  }), [orders, drivers, q, filter]);

  const chips = [{ id: "all", label: "הכל" }, ...STATUS_ORDER.map(s => ({ id: s, label: STATUSES[s].label }))];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 16, flexWrap: "wrap" }}>
        <div>
          <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, color: "var(--ink)" }}>לוח הזמנות</h1>
          <p style={{ margin: "4px 0 0", color: "var(--muted)", fontSize: 14.5 }}>מעקב אחר איסוף וחלוקת קרטונים לסניפים</p>
        </div>
        <Button icon="plus" onClick={onNew}>הזמנה חדשה</Button>
      </div>

      <StatTiles orders={orders} />

      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center" }}>
        <div style={{ position: "relative", flex: "1 1 220px", maxWidth: 360 }}>
          <span style={{ position: "absolute", insetInlineStart: 13, top: "50%", transform: "translateY(-50%)", color: "var(--muted)" }}>
            <Icon name="search" size={18} />
          </span>
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="חיפוש בנק, סניף, נהג…"
            style={{ ...inputStyle, paddingInlineStart: 42 }} />
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {chips.map(c => (
            <button key={c.id} onClick={() => setFilter(c.id)} style={{
              height: 38, padding: "0 16px", borderRadius: 999, cursor: "pointer", fontFamily: "var(--font)",
              fontWeight: 600, fontSize: 14, border: "1.5px solid var(--line)",
              background: filter === c.id ? "var(--primary)" : "var(--surface)",
              color: filter === c.id ? "var(--on-primary)" : "var(--muted)" }}>{c.label}</button>
          ))}
        </div>
      </div>

      {filtered.length === 0 ? (
        <EmptyState text="אין הזמנות שתואמות את הסינון" />
      ) : layout === "kanban" ? (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16, alignItems: "start" }}>
          {STATUS_ORDER.map(st => {
            const col = filtered.filter(o => o.status === st);
            const ss = statusStyle(st);
            return (
              <div key={st} style={{ background: "var(--surface-2)", border: "1.5px solid var(--line)",
                borderRadius: "var(--radius-lg)", padding: 12, display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 4px 0" }}>
                  <span style={{ width: 9, height: 9, borderRadius: 999, background: ss.dot }} />
                  <span style={{ fontWeight: 700, color: "var(--ink)", fontSize: 15 }}>{STATUSES[st].label}</span>
                  <span style={{ marginInlineStart: "auto", fontSize: 13, fontWeight: 600, color: "var(--muted)",
                    background: "var(--surface)", border: "1px solid var(--line)", borderRadius: 999, padding: "1px 9px" }}>{col.length}</span>
                </div>
                {col.map(o => <OrderCard key={o.id} order={o} drivers={drivers} variant="kanban" onOpen={onOpen} />)}
                {col.length === 0 && <div style={{ color: "var(--muted)", fontSize: 13, textAlign: "center", padding: "12px 0" }}>ריק</div>}
              </div>
            );
          })}
        </div>
      ) : layout === "cards" ? (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16 }}>
          {filtered.map(o => <OrderCard key={o.id} order={o} drivers={drivers} variant="cards" onOpen={onOpen} />)}
        </div>
      ) : (
        <div style={{ background: "var(--surface)", border: "1.5px solid var(--line)", borderRadius: "var(--radius-lg)",
          overflow: "hidden", boxShadow: "var(--shadow)" }}>
          <div style={{ display: "grid", gridTemplateColumns: "minmax(160px,1.4fr) 1fr auto auto auto", gap: 14,
            padding: "11px 18px", background: "var(--surface-2)", borderBottom: "1px solid var(--line)",
            fontSize: 12.5, fontWeight: 700, color: "var(--muted)" }}>
            <span>בנק / סניף</span><span>נהג</span><span>קרטונים</span><span>איסוף</span><span>סטטוס</span>
          </div>
          {filtered.map(o => <OrderCard key={o.id} order={o} drivers={drivers} variant="row" onOpen={onOpen} />)}
        </div>
      )}
    </div>
  );
}

// ============ Form screens ============
const { useState: useStateF } = React;

function NewOrderScreen({ drivers, onCreate, onCancel }) {
  const [bankCode, setBankCode]       = useStateF("");
  const [branchNumber, setBranchNumber] = useStateF("");
  const [branchName, setBranchName]   = useStateF("");
  const [driverId, setDriverId]       = useStateF("");
  const [cartons, setCartons]         = useStateF(4);
  const [date, setDate]               = useStateF(todayISO(0));
  const [time, setTime]               = useStateF("09:00");
  const [notes, setNotes]             = useStateF("");
  const [errors, setErrors]           = useStateF({});

  async function submit() {
    const e = {};
    if (!bankCode) e.bankCode = "בחר/י בנק";
    if (!branchNumber.trim()) e.branchNumber = "נדרש מספר סניף";
    if (!driverId) e.driverId = "בחר/י נהג";
    setErrors(e);
    if (Object.keys(e).length) return;
    await onCreate({ id: nextOrderId(), bankCode, branchNumber: branchNumber.trim(),
      branchName: branchName.trim() || "—", driverId, cartons, date, time, status: "pending", notes: notes.trim() });
  }

  const selStyle = { ...inputStyle, appearance: "none", cursor: "pointer" };

  return (
    <div style={{ maxWidth: 720, margin: "0 auto", width: "100%" }}>
      <button onClick={onCancel} style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "none",
        border: "none", color: "var(--muted)", cursor: "pointer", fontFamily: "var(--font)", fontSize: 14, marginBottom: 12 }}>
        <Icon name="arrowLeft" size={18} /> חזרה ללוח
      </button>
      <h1 style={{ margin: "0 0 4px", fontSize: 26, fontWeight: 800, color: "var(--ink)" }}>הזמנה חדשה</h1>
      <p style={{ margin: "0 0 24px", color: "var(--muted)", fontSize: 14.5 }}>מילוי פרטי האיסוף וכמות הקרטונים לסניף</p>

      <div style={{ background: "var(--surface)", border: "1.5px solid var(--line)", borderRadius: "var(--radius-lg)",
        padding: "var(--pad)", boxShadow: "var(--shadow)", display: "flex", flexDirection: "column", gap: 20 }}>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px,1fr))", gap: 16 }}>
          <Field label="שם הבנק" error={errors.bankCode}>
            <div style={{ position: "relative" }}>
              <select value={bankCode} onChange={e => setBankCode(e.target.value)}
                style={{ ...selStyle, color: bankCode ? "var(--ink)" : "var(--muted)" }}>
                <option value="">בחר/י בנק…</option>
                {BANKS.map(b => <option key={b.code} value={b.code}>{b.name}</option>)}
              </select>
              <span style={{ position: "absolute", insetInlineEnd: 13, top: "50%", transform: "translateY(-50%) rotate(90deg)",
                pointerEvents: "none", color: "var(--muted)" }}><Icon name="chevron" size={16} /></span>
            </div>
          </Field>
          <Field label="מספר סניף" error={errors.branchNumber}>
            <input value={branchNumber} onChange={e => setBranchNumber(e.target.value.replace(/\D/g, "").slice(0, 4))}
              inputMode="numeric" placeholder="למשל 612" style={inputStyle} />
          </Field>
        </div>

        <Field label="שם / כתובת הסניף" hint="לא חובה">
          <input value={branchName} onChange={e => setBranchName(e.target.value)} placeholder="למשל: דיזנגוף סנטר" style={inputStyle} />
        </Field>

        <Field label="נהג מבצע" error={errors.driverId}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px,1fr))", gap: 10 }}>
            {drivers.map(d => {
              const sel = driverId === d.id;
              return (
                <button key={d.id} onClick={() => setDriverId(d.id)} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", cursor: "pointer",
                  border: `1.5px solid ${sel ? "var(--primary)" : "var(--line)"}`, borderRadius: "var(--radius)",
                  background: sel ? "var(--primary-soft)" : "var(--surface)", textAlign: "start", fontFamily: "var(--font)" }}>
                  <Avatar name={d.name} color={d.color} size={34} />
                  <span style={{ display: "flex", flexDirection: "column", minWidth: 0 }}>
                    <span style={{ fontWeight: 600, fontSize: 14.5, color: "var(--ink)" }}>{d.name}</span>
                    <span style={{ fontSize: 12, color: "var(--muted)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.vehicle.split("—")[0]}</span>
                  </span>
                </button>
              );
            })}
          </div>
        </Field>

        <Field label="כמות קרטונים">
          <Stepper value={cartons} onChange={setCartons} />
        </Field>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px,1fr))", gap: 16 }}>
          <Field label="תאריך איסוף">
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={inputStyle} />
          </Field>
          <Field label="שעת איסוף">
            <input type="time" value={time} onChange={e => setTime(e.target.value)} style={inputStyle} />
          </Field>
        </div>

        <Field label="הערות" hint="לא חובה">
          <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={2}
            placeholder="הוראות גישה, איש קשר בסניף…"
            style={{ ...inputStyle, height: "auto", padding: 14, resize: "vertical", lineHeight: 1.5 }} />
        </Field>

        <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", flexWrap: "wrap" }}>
          <Button variant="ghost" onClick={onCancel}>ביטול</Button>
          <Button icon="check" onClick={submit}>יצירת הזמנה</Button>
        </div>
      </div>
    </div>
  );
}

function Metric({ value, label }) {
  return (
    <div style={{ flex: 1 }}>
      <div style={{ fontWeight: 800, fontSize: 24, color: "var(--ink)", fontVariantNumeric: "tabular-nums" }}>{value}</div>
      <div style={{ fontSize: 12.5, color: "var(--muted)" }}>{label}</div>
    </div>
  );
}

function DriversScreen({ drivers, orders, onAdd, onDelete }) {
  const [open, setOpen] = useStateF(false);
  const [name, setName] = useStateF("");
  const [phone, setPhone] = useStateF("");
  const [vehicle, setVehicle] = useStateF("");

  async function add() {
    if (!name.trim()) return;
    const colors = ["#2563eb", "#0d9488", "#db5b34", "#7c3aed", "#d4357f", "#0891b2"];
    await onAdd({ id: "d" + Date.now(), name: name.trim(), phone: phone.trim() || "—",
      vehicle: vehicle.trim() || "—", color: colors[drivers.length % colors.length] });
    setName(""); setPhone(""); setVehicle(""); setOpen(false);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 16, flexWrap: "wrap" }}>
        <div>
          <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, color: "var(--ink)" }}>נהגים</h1>
          <p style={{ margin: "4px 0 0", color: "var(--muted)", fontSize: 14.5 }}>צוות הנהגים ועומס ההזמנות הפעיל</p>
        </div>
        <Button icon="plus" onClick={() => setOpen(true)}>הוספת נהג</Button>
      </div>

      {open && (
        <div style={{ background: "var(--surface)", border: "1.5px solid var(--line)", borderRadius: "var(--radius-lg)",
          padding: "var(--pad)", boxShadow: "var(--shadow)", display: "grid",
          gridTemplateColumns: "repeat(auto-fit, minmax(180px,1fr))", gap: 14, alignItems: "end" }}>
          <Field label="שם מלא"><input value={name} onChange={e => setName(e.target.value)} placeholder="שם הנהג" style={inputStyle} /></Field>
          <Field label="טלפון"><input value={phone} onChange={e => setPhone(e.target.value)} placeholder="05X-XXXXXXX" style={inputStyle} /></Field>
          <Field label="רכב"><input value={vehicle} onChange={e => setVehicle(e.target.value)} placeholder="סוג — מספר" style={inputStyle} /></Field>
          <div style={{ display: "flex", gap: 10 }}>
            <Button onClick={add} full>שמירה</Button>
            <Button variant="ghost" onClick={() => setOpen(false)}>ביטול</Button>
          </div>
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px,1fr))", gap: 16 }}>
        {drivers.map(d => {
          const active  = orders.filter(o => o.driverId === d.id && o.status !== "done");
          const cartons = active.reduce((a, o) => a + o.cartons, 0);
          return (
            <div key={d.id} style={{ background: "var(--surface)", border: "1.5px solid var(--line)",
              borderRadius: "var(--radius-lg)", padding: 18, boxShadow: "var(--shadow)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <Avatar name={d.name} color={d.color} size={46} />
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 16.5, color: "var(--ink)" }}>{d.name}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 5, color: "var(--muted)", fontSize: 13, marginTop: 2 }}>
                    <Icon name="phone" size={13} /> {d.phone}
                  </div>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6, color: "var(--muted)", fontSize: 13, marginTop: 12 }}>
                <Icon name="truck" size={15} /> {d.vehicle}
              </div>
              <div style={{ display: "flex", gap: 10, marginTop: 14, paddingTop: 14, borderTop: "1px solid var(--line)" }}>
                <Metric value={active.length} label="הזמנות פעילות" />
                <Metric value={cartons} label="קרטונים" />
              </div>
              <Button variant="danger" icon="x" size="sm" full style={{ marginTop: 14 }} onClick={() => onDelete(d.id)}>הסרת נהג</Button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Detail({ icon, label, value, sub, avatar }) {
  return (
    <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
      {avatar ? <Avatar name={avatar.name} color={avatar.color} size={38} /> : (
        <span style={{ width: 38, height: 38, borderRadius: 10, flexShrink: 0, display: "grid", placeItems: "center",
          background: "var(--surface-2)", border: "1px solid var(--line)", color: "var(--muted)" }}><Icon name={icon} size={18} /></span>
      )}
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 12.5, color: "var(--muted)" }}>{label}</div>
        <div style={{ fontSize: 15.5, color: "var(--ink)", fontWeight: 600, marginTop: 1 }}>{value}</div>
        {sub && <div style={{ fontSize: 12.5, color: "var(--muted)", marginTop: 1 }}>{sub}</div>}
      </div>
    </div>
  );
}

function OrderSheet({ order, drivers, onClose, onAdvance, role }) {

  const bank = bankByCode(order.bankCode);
  const driver = driverById(drivers, order.driverId);
  const idx = STATUS_ORDER.indexOf(order.status);
  const nextStatus = STATUS_ORDER[idx + 1];
  const nextLabel = { transit: "סמן יצא לדרך", done: "סמן כהושלם" };

  return (
    <div onClick={onClose} style={{ position: "absolute", inset: 0, zIndex: 50,
      background: "rgba(8,12,20,.42)", display: "flex", justifyContent: "flex-start" }}>
      <div onClick={e => e.stopPropagation()} className="sheet" style={{
        width: "min(440px, 92%)", height: "100%", background: "var(--surface)", boxShadow: "0 0 60px rgba(0,0,0,.25)",
        display: "flex", flexDirection: "column", overflowY: "auto" }}>
        <div style={{ padding: "18px var(--pad)", borderBottom: "1px solid var(--line)", display: "flex",
          alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: 12.5, color: "var(--muted)", fontVariantNumeric: "tabular-nums" }}>הזמנה {order.id}</div>
            <h2 style={{ margin: "2px 0 0", fontSize: 21, fontWeight: 800, color: "var(--ink)" }}>{bank.name}</h2>
          </div>
          <button onClick={onClose} style={{ width: 38, height: 38, borderRadius: 10, border: "1.5px solid var(--line)",
            background: "var(--surface)", color: "var(--muted)", cursor: "pointer", display: "grid", placeItems: "center" }}>
            <Icon name="x" size={18} />
          </button>
        </div>

        <div style={{ padding: "var(--pad)", display: "flex", flexDirection: "column", gap: 18 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <StatusPill status={order.status} size="lg" />
            <span style={{ display: "inline-flex", alignItems: "center", gap: 7, fontWeight: 800, fontSize: 22, color: "var(--ink)" }}>
              <Icon name="box" size={22} /> {order.cartons}
              <span style={{ fontWeight: 500, fontSize: 14, color: "var(--muted)" }}>קרטונים</span>

                    <div style={{ width: 30, height: 30, borderRadius: 999, display: "grid", placeItems: "center",
                      background: done ? ss.solid : "var(--surface-2)", color: done ? "#fff" : "var(--muted)",
                      border: done ? "none" : "1.5px solid var(--line)" }}>
                      {done ? <Icon name="check" size={15} /> : <span style={{ fontSize: 12, fontWeight: 700 }}>{i + 1}</span>}
                    </div>
                    <span style={{ fontSize: 11.5, color: done ? "var(--ink)" : "var(--muted)", fontWeight: 600 }}>{STATUSES[st].label}</span>
                  </div>
                  {i < STATUS_ORDER.length - 1 && (
                    <div style={{ flex: 1, height: 2, background: i < idx ? ss.solid : "var(--line)", marginBottom: 18 }} />
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>

        <div style={{ marginTop: "auto", padding: "var(--pad)", borderTop: "1px solid var(--line)", display: "flex", gap: 12 }}>
          {nextStatus ? (
            <Button size="lg" full icon={nextStatus === "done" ? "check" : "truck"}
              onClick={() => onAdvance(order.id, nextStatus)}>{nextLabel[nextStatus]}</Button>
          ) : (
            <div style={{ flex: 1, textAlign: "center", color: "var(--muted)", fontSize: 14, padding: "12px 0",
              display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
              <Icon name="check" size={18} /> ההזמנה הושלמה
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============ Driver view ============
const { useState: useStateD } = React;

function DriverView({ me, drivers, orders, onPickMe, onOpen, onAdvance }) {
  const mine   = orders.filter(o => o.driverId === me.id);
  const active = mine.filter(o => o.status !== "done").sort((a, b) => STATUS_ORDER.indexOf(b.status) - STATUS_ORDER.indexOf(a.status));
  const done   = mine.filter(o => o.status === "done");
  const cartonsToday = active.reduce((a, o) => a + o.cartons, 0);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18, maxWidth: 640, margin: "0 auto", width: "100%" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <Avatar name={me.name} color={me.color} size={52} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13.5, color: "var(--muted)" }}>שלום,</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: "var(--ink)" }}>{me.name}</div>
        </div>
        <select value={me.id} onChange={e => onPickMe(e.target.value)} title="החלפת נהג (הדגמה)"
          style={{ height: 38, borderRadius: 999, border: "1.5px solid var(--line)", background: "var(--surface)",
            color: "var(--muted)", padding: "0 12px", fontFamily: "var(--font)", fontSize: 13, cursor: "pointer" }}>
          {drivers.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}
        </select>
      </div>

      <div style={{ display: "flex", gap: 12 }}>
        <div style={{ flex: 1, background: "var(--primary)", color: "var(--on-primary)", borderRadius: "var(--radius-lg)",
          padding: 18, boxShadow: "var(--shadow)" }}>
          <div style={{ opacity: .85, fontSize: 13.5 }}>משימות פעילות</div>
          <div style={{ fontSize: 34, fontWeight: 800, marginTop: 4 }}>{active.length}</div>
        </div>
        <div style={{ flex: 1, background: "var(--surface)", border: "1.5px solid var(--line)", borderRadius: "var(--radius-lg)",
          padding: 18, boxShadow: "var(--shadow)" }}>
          <div style={{ color: "var(--muted)", fontSize: 13.5 }}>קרטונים לחלוקה</div>
          <div style={{ fontSize: 34, fontWeight: 800, marginTop: 4, color: "var(--ink)",
            display: "inline-flex", alignItems: "center", gap: 8 }}><Icon name="box" size={26} />{cartonsToday}</div>
        </div>
      </div>

      <h2 style={{ margin: "6px 0 -4px", fontSize: 17, fontWeight: 700, color: "var(--ink)" }}>המשימות שלי</h2>

      {active.length === 0 && <EmptyState text="אין משימות פעילות — כל הכבוד!" />}

      {active.map(o => {
        const bank = bankByCode(o.bankCode);
        const idx  = STATUS_ORDER.indexOf(o.status);
        const next = STATUS_ORDER[idx + 1];
        const nextLabel = { transit: "יצאתי לדרך", done: "הגעתי — הושלם" };
        return (
          <div key={o.id} style={{ background: "var(--surface)", border: "1.5px solid var(--line)",
            borderRadius: "var(--radius-lg)", boxShadow: "var(--shadow)", overflow: "hidden" }}>
            <div onClick={() => onOpen(o)} style={{ padding: 18, cursor: "pointer", display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 18, color: "var(--ink)" }}>{bank.name}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, color: "var(--muted)", fontSize: 14, marginTop: 3 }}>
                    <Icon name="pin" size={15} /> סניף {o.branchNumber} · {o.branchName}
                  </div>
                </div>
                <StatusPill status={o.status} size="lg" />
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 16, color: "var(--muted)", fontSize: 14 }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 6, color: "var(--ink)", fontWeight: 700, fontSize: 16 }}>
                  <Icon name="box" size={19} /> {o.cartons} <span style={{ fontWeight: 500, color: "var(--muted)", fontSize: 13 }}>קרטונים</span>
                </span>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><Icon name="clock" size={15} /> {fmtDate(o.date)} · {o.time}</span>
              </div>
              {o.notes && (
                <div style={{ display: "flex", gap: 7, alignItems: "flex-start", background: "var(--surface-2)",
                  border: "1px solid var(--line)", borderRadius: "var(--radius)", padding: "9px 12px", color: "var(--muted)", fontSize: 13.5 }}>
                  <Icon name="flag" size={15} /> {o.notes}
                </div>
              )}
            </div>
            {next && (
              <div style={{ padding: "0 18px 18px" }}>
                <Button size="lg" full icon={next === "done" ? "check" : "truck"}
                  variant={next === "done" ? "primary" : "soft"}
                  onClick={() => onAdvance(o.id, next)}>{nextLabel[next]}</Button>
              </div>
            )}
          </div>
        );
      })}

      {done.length > 0 && (
        <details style={{ marginTop: 4 }}>
          <summary style={{ cursor: "pointer", color: "var(--muted)", fontSize: 14.5, fontWeight: 600, padding: "6px 0" }}>
            הושלמו היום ({done.length})
          </summary>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, marginTop: 10 }}>
            {done.map(o => {
              const bank = bankByCode(o.bankCode);
              return (
                <div key={o.id} onClick={() => onOpen(o)} style={{ display: "flex", alignItems: "center", gap: 12,
                  background: "var(--surface)", border: "1.5px solid var(--line)", borderRadius: "var(--radius)",
                  padding: "12px 16px", cursor: "pointer", opacity: .75 }}>
                  <span style={{ width: 32, height: 32, borderRadius: 999, display: "grid", placeItems: "center",
                    background: statusStyle("done").bg, color: statusStyle("done").fg }}><Icon name="check" size={16} /></span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, color: "var(--ink)" }}>{bank.name}</div>
                    <div style={{ fontSize: 13, color: "var(--muted)" }}>סניף {o.branchNumber} · {o.cartons} קרטונים</div>
                  </div>
                </div>
              );
            })}
          </div>
        </details>
      )}
    </div>
  );
}

// ============ Main app ============
const { useState: useStateA, useEffect: useEffectA } = React;

function useWindowWidth() {
  const [w, setW] = useStateA(window.innerWidth);
  useEffectA(() => {
    const on = () => setW(window.innerWidth);
    window.addEventListener("resize", on);
    return () => window.removeEventListener("resize", on);
  }, []);
  return w;
}

function Brand({ dark, small }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ width: small ? 32 : 38, height: small ? 32 : 38, borderRadius: 11, background: "var(--primary)",
        color: "var(--on-primary)", display: "grid", placeItems: "center", flexShrink: 0 }}>
        <Icon name="truck" size={small ? 19 : 22} />
      </div>
      <div style={{ lineHeight: 1.1 }}>
        <div style={{ fontWeight: 800, fontSize: small ? 16 : 17, color: dark ? "var(--side-ink)" : "var(--ink)" }}>ששי</div>
        <div style={{ fontSize: 11.5, color: dark ? "var(--side-muted)" : "var(--muted)" }}>ניהול משלוחים</div>
      </div>
    </div>
  );
}

function RoleToggle({ role, setRole, setRoute, compact }) {
  return (
    <div style={{ display: "flex", gap: 4, background: "var(--surface-2)", border: "1.5px solid var(--line)",
      borderRadius: 999, padding: 4 }}>
      {[["manager", "מנהל"], ["driver", "נהג"]].map(([id, lbl]) => (
        <button key={id} onClick={() => { setRole(id); setRoute("orders"); }} style={{
          padding: compact ? "6px 14px" : "8px 18px", borderRadius: 999, cursor: "pointer", border: "none",
          fontFamily: "var(--font)", fontSize: 13.5, fontWeight: 700,
          background: role === id ? "var(--primary)" : "transparent",
          color: role === id ? "var(--on-primary)" : "var(--muted)" }}>{lbl}</button>
      ))}
    </div>
  );
}

function App() {
  const dir = "bold";
  const [role, setRole]     = useStateA("manager");
  const [route, setRoute]   = useStateA("orders");
  const [orders, setOrders] = useStateA([]);
  const [drivers, setDrivers] = useStateA([]);
  const [meId, setMeId]     = useStateA("d1");
  const [sheetId, setSheetId] = useStateA(null);
  const [toast, setToast]   = useStateA(null);
  const [userId, setUserId] = useStateA(null);
  const [isOnline, setIsOnline] = useStateA(navigator.onLine);

  // Load data from Firestore on mount
  React.useEffect(() => {
    const loadData = async () => {
      try {
        const orders = await firestore.getOrders();
        // Deduplicate by ID
        const seen = new Set();
        const unique = orders.filter(o => {
          if (seen.has(o.id)) return false;
          seen.add(o.id);
          return true;
        });
        setOrders(unique);
      } catch (err) {
        console.log("Could not load orders");
      }

      try {
        const drivers = await firestore.getDrivers();
        // Deduplicate by ID
        const seen = new Set();
        const unique = drivers.filter(d => {
          if (seen.has(d.id)) return false;
          seen.add(d.id);
          return true;
        });
        setDrivers(unique);
      } catch (err) {
        console.log("Could not load drivers");
      }
    };

    loadData();
  }, []);

  // Set user ID (for demo, just use a session ID)
  React.useEffect(() => {
    if (!userId) {
      setUserId("user_" + Math.random().toString(36).substr(2, 9));
    }
  }, []);

  // Firebase: Online/offline listener
  React.useEffect(() => {
    const handleOnline = () => setIsOnline(true);
    const handleOffline = () => setIsOnline(false);

    window.addEventListener("online", handleOnline);
    window.addEventListener("offline", handleOffline);

    return () => {
      window.removeEventListener("online", handleOnline);
      window.removeEventListener("offline", handleOffline);
    };
  }, []);

  const D = DIRECTIONS[dir];
  const winW = useWindowWidth();
  const compact = winW < 820;
  const me = driverById(drivers, meId) || drivers[0];
  const sheetOrder = orders.find(o => o.id === sheetId) || null;

  function showToast(msg) {
    setToast(msg);
    clearTimeout(window.__t);
    window.__t = setTimeout(() => setToast(null), 2200);
  }

  async function createOrder(o) {
    try {
      await firestore.createOrder(o);
      // Update local state optimistically
      setOrders(prev => [o, ...prev]);
      setRoute("orders");
      showToast(`הזמנה ${o.id} נוצרה ✅`);
    } catch (err) {
      console.error("Create order failed:", err);
      showToast("שגיאה: לא היתה אפשרות לשמור את ההזמנה");
    }
  }

  async function advance(id, status) {
    try {
      // Update local state optimistically
      setOrders(prev => prev.map(o => o.id === id ? { ...o, status } : o));
      await firestore.updateOrderStatus(id, status);
      showToast(status === "done" ? "ההזמנה סומנה כהושלמה ✅" : "ההזמנה עודכנה — בדרך ✅");
      if (status === "done") setSheetId(null);
    } catch (err) {
      console.error("Advance order failed:", err);
      showToast("שגיאה: לא היתה אפשרות לעדכן את ההזמנה");
    }
  }

  async function addDriver(d) {
    try {
      await firestore.addDriver(d);
      // Update local state optimistically
      setDrivers(prev => [...prev, d]);
      showToast("נהג נוסף ✅");
    } catch (err) {
      console.error("Add driver failed:", err);
      showToast("שגיאה: לא היתה אפשרות להוסיף את הנהג");
    }
  }

  async function deleteDriver(id) {
    try {
      await firestore.deleteDriver(id);
      // Update local state
      setDrivers(prev => prev.filter(d => d.id !== id));
      showToast("נהג הוסר ✅");
    } catch (err) {
      console.error("Delete driver failed:", err);
      showToast("שגיאה: לא היתה אפשרות להסיר את הנהג");
    }
  }

  const themeStyle = { ...D.vars, fontFamily: "var(--font)", direction: "rtl" };

  const navItems = [
    { id: "orders",  label: "לוח הזמנות", icon: "home"  },
    { id: "new",     label: "הזמנה חדשה", icon: "plus"  },
    { id: "drivers", label: "נהגים",       icon: "users" },
  ];

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: "#11131a", fontFamily: "var(--font)" }}>
      {!isOnline && (
        <div style={{ background: "#f59e0b", color: "white", padding: 12, textAlign: "center", fontWeight: 600, fontSize: 14 }}>
          אתה בחוץ מהרשת — עובד על מטמון מקומי
        </div>
      )}
      {/* STAGE */}
      <div style={{ flex: 1, minHeight: 0, display: "flex", justifyContent: "center", alignItems: "stretch",
        padding: 0 }}>
        <div style={{ ...themeStyle, position: "relative", overflowY: "auto", background: "var(--bg)", color: "var(--ink)",
          width: "100%", maxWidth: "none",
          height: "100%", borderRadius: 0,
          border: "none",
          boxShadow: "none",
          display: "flex", flexDirection: compact ? "column" : "row" }}>

          {/* SIDEBAR */}
          {role === "manager" && !compact && (
            <aside style={{ width: 232, flexShrink: 0, background: "var(--side-bg)", borderInlineEnd: "1px solid var(--line)",
              display: "flex", flexDirection: "column", padding: 18, gap: 6 }}>
              <Brand dark={D.navStyle === "dark"} />
              <nav style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 14 }}>
                {navItems.map(n => {
                  const on = route === n.id;
                  return (
                    <button key={n.id} onClick={() => setRoute(n.id)} style={{
                      display: "flex", alignItems: "center", gap: 12, padding: "11px 14px", borderRadius: "var(--radius)",
                      cursor: "pointer", border: "none", fontFamily: "var(--font)", fontSize: 15, fontWeight: 600,
                      textAlign: "start", width: "100%",
                      background: on ? "var(--primary)" : "transparent",
                      color: on ? "var(--on-primary)" : "var(--side-muted)" }}>
                      <Icon name={n.icon} size={19} /> {n.label}
                    </button>
                  );
                })}
              </nav>
              <div style={{ marginTop: "auto" }}><RoleToggle role={role} setRole={setRole} setRoute={setRoute} /></div>
            </aside>
          )}

          {/* MAIN */}
          <div style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
            <header style={{ flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "space-between",
              gap: 12, padding: compact ? "14px 18px" : "16px 28px", borderBottom: "1px solid var(--line)",
              background: "var(--surface)" }}>
              {compact ? <Brand dark={false} small /> : (
                <div style={{ fontWeight: 700, color: "var(--muted)", fontSize: 14 }}>
                  {role === "manager" ? "ניהול הזמנות ומשלוחים" : "אזור הנהג"}
                </div>
              )}
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                {(compact || role === "driver") && <RoleToggle role={role} setRole={setRole} setRoute={setRoute} compact />}
              </div>
            </header>

            <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: compact ? "18px 16px 18px" : "28px 28px 40px" }}>
              {role === "driver" ? (
                <DriverView me={me} drivers={drivers} orders={orders} onPickMe={setMeId}
                  onOpen={o => setSheetId(o.id)} onAdvance={advance} />
              ) : route === "new" ? (
                <NewOrderScreen drivers={drivers} onCreate={createOrder} onCancel={() => setRoute("orders")} />
              ) : route === "drivers" ? (
                <DriversScreen drivers={drivers} orders={orders} onAdd={addDriver} onDelete={deleteDriver} />
              ) : (
                <OrdersScreen orders={orders} drivers={drivers} layout={D.ordersLayout}
                  onOpen={o => setSheetId(o.id)} onNew={() => setRoute("new")} />
              )}
            </div>

            {/* bottom tabs (compact manager) */}
            {role === "manager" && compact && (
              <nav style={{ position: "fixed", bottom: 0, insetInline: 0, height: 72, background: "var(--surface)",
                borderTop: "1px solid var(--line)", display: "flex", alignItems: "stretch", paddingBottom: "max(8px, env(safe-area-inset-bottom))", zIndex: 100 }}>
                {navItems.map(n => {
                  const on = route === n.id;
                  if (n.id === "new") return (
                    <div key={n.id} style={{ flex: 1, display: "grid", placeItems: "center" }}>
                      <button onClick={() => setRoute("new")} style={{ width: 54, height: 54, borderRadius: "50%",
                        background: "var(--primary)", color: "var(--on-primary)", border: "none", cursor: "pointer",
                        display: "grid", placeItems: "center", boxShadow: "var(--shadow)", marginTop: -14 }}>
                        <Icon name="plus" size={26} />
                      </button>
                    </div>
                  );
                  return (
                    <button key={n.id} onClick={() => setRoute(n.id)} style={{ flex: 1, display: "flex",
                      flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 3, border: "none",
                      background: "transparent", cursor: "pointer", fontFamily: "var(--font)", fontSize: 11.5, fontWeight: 600,
                      color: on ? "var(--primary)" : "var(--muted)" }}>
                      <Icon name={n.icon} size={22} /> {n.label.replace("לוח ", "")}
                    </button>
                  );
                })}
              </nav>
            )}
          </div>

          {/* order detail sheet */}
          <OrderSheet order={sheetOrder} drivers={drivers} role={role}
            onClose={() => setSheetId(null)} onAdvance={advance} />

          {/* toast */}
          {toast && (
            <div style={{ position: "absolute", bottom: compact && role === "manager" ? 88 : 24, insetInline: 0,
              display: "flex", justifyContent: "center", zIndex: 60, pointerEvents: "none" }}>
              <div style={{ background: "var(--ink)", color: "var(--surface)", padding: "11px 20px", borderRadius: 999,
                fontSize: 14, fontWeight: 600, boxShadow: "0 8px 30px rgba(0,0,0,.25)", display: "inline-flex",
                alignItems: "center", gap: 8 }}>
                <Icon name="check" size={17} /> {toast}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
